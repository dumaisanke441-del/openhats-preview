<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>活动照片上传</title>
  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#fff;color:#111827;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}
    main{max-width:560px;margin:0 auto;padding:28px 18px 56px} h1{font-size:34px;line-height:1.05;letter-spacing:-.05em;margin:0 0 12px} p{margin:0;color:#4b5563} .card{border:1px solid #e5e7eb;border-radius:18px;padding:18px;margin:16px 0;background:#fff} label{display:block;font-size:14px;font-weight:800;margin-bottom:7px} input,textarea{width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px;font:inherit} input[type=file]{background:#f9fafb;padding:18px} .btn{width:100%;border:0;border-radius:16px;background:#111827;color:white;font-size:18px;font-weight:900;padding:16px;margin-top:14px} .hint,.fine{font-size:13px;color:#6b7280;margin-top:8px} .fine{border-top:1px solid #e5e7eb;padding-top:14px} .status{display:none;border-radius:14px;padding:12px;margin-top:12px;font-size:14px} .ok{display:block;background:#ecfdf5;color:#166534;border:1px solid #bbf7d0} .bad{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fecaca} .file{font-size:13px;color:#374151;background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:10px;margin-top:8px} .bar{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:12px;display:none} .bar span{display:block;height:100%;width:0;background:#2563eb;transition:.2s}
  </style>
</head>
<body>
<main>
  <h1>活动照片上传</h1>
  <p id="eventDesc">请上传你在现场拍到的照片，帮助整理活动回忆。无需登录 Google。</p>

  <form id="uploadForm" class="card">
    <label for="uploader">姓名 / ID / 代号 *</label>
    <input id="uploader" required placeholder="例如：Victor / A12 / 桌号6" autocomplete="name" />

    <label for="files" style="margin-top:16px">上传照片 *</label>
    <input id="files" type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" multiple required />
    <div class="hint">规则：临时测试期不限制上传张数和单张体积；请尽量上传手机相册原图，后台会在整理阶段统计可用的拍摄时间。</div>
    <div id="preview"></div>

    <button class="btn" id="submitBtn" type="submit">上传照片</button>
    <div class="bar" id="progress"><span></span></div>
    <div id="status" class="status"></div>

    <div class="fine">免责说明：请只上传与本活动相关、你有权分享的照片。上传后，活动组织者可用于本次活动资料整理、回忆记录和内部展示测试。请勿上传隐私、敏感或不适合公开展示的内容。</div>
  </form>
</main>
<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycby3yJC1MOGSrA8If2tRArf0-cw4DAnBfdFssYdvwjT9EWsWbXIWta3piUUEE4fdmced/exec';
const EVENT_ID = new URLSearchParams(location.search).get('event') || 'tonight-public-event';
const EVENT_TITLE = new URLSearchParams(location.search).get('title') || 'Tonight Public Event';
const MAX_FILES=999, MAX_BYTES=Number.POSITIVE_INFINITY;
let prepared=[];
function fmtBytes(n){return n>1024*1024?(n/1024/1024).toFixed(1)+' MB':Math.round(n/1024)+' KB'}
function normalizeDate(v){if(!v)return ''; if(v instanceof Date&&!isNaN(v))return v.toISOString(); const d=new Date(v); return isNaN(d)?String(v):d.toISOString();}
function show(k,m){const el=document.getElementById('status'); el.className='status '+k; el.textContent=m;}
function prog(p){const b=document.getElementById('progress'); b.style.display='block'; b.querySelector('span').style.width=p+'%';}
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(file);})}
async function inspect(){
  const box=document.getElementById('preview'); box.innerHTML=''; prepared=[];
  const files=[...document.getElementById('files').files];
  if(files.length>MAX_FILES){show('bad','临时测试期不限制上传张数。'); return;}
  for(const file of files){
    if(file.size>MAX_BYTES){box.insertAdjacentHTML('beforeend',`<div class="file">❌ ${file.name} · ${fmtBytes(file.size)}，文件较大，若上传失败请改用较小文件</div>`); continue;}
    let exif={}, shotAt='', modifiedAt='';
    try{exif=await exifr.parse(file)||{};}catch(e){}
    shotAt=normalizeDate(exif.DateTimeOriginal||exif.CreateDate||exif.DateTimeDigitized||exif.DateCreated||exif.CreateDateTime||exif.MediaCreateDate);
    modifiedAt=normalizeDate(exif.ModifyDate||exif.FileModifyDate||file.lastModifiedDate||file.lastModified);
    prepared.push({file,shotAt,modifiedAt,exifKeys:Object.keys(exif||{})});
    box.insertAdjacentHTML('beforeend',`<div class="file">✅ ${file.name} · ${fmtBytes(file.size)} · 已选择</div>`);
  }
}
document.getElementById('files').addEventListener('change',inspect);
document.getElementById('uploadForm').addEventListener('submit',async e=>{
  e.preventDefault(); await inspect();
  if(!prepared.length){show('bad','请选择有效照片。');return;}
  const uploader=document.getElementById('uploader').value.trim(); if(!uploader){show('bad','请填写姓名 / ID / 代号。');return;}
  const btn=document.getElementById('submitBtn'); btn.disabled=true; prog(5);
  try{let done=0; for(const p of prepared){
    const payload={eventId:EVENT_ID,eventTitle:EVENT_TITLE,uploader,group:'',note:'',filename:p.file.name,mimeType:p.file.type||'application/octet-stream',size:p.file.size,shotAt:p.shotAt,modifiedAt:p.modifiedAt,clientUploadAt:new Date().toISOString(),exifKeys:p.exifKeys,userAgent:navigator.userAgent,dataBase64:await fileToBase64(p.file)};
    const body=new URLSearchParams(); body.set('payload',JSON.stringify(payload));
    await fetch(BACKEND,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
    done++; prog(5+Math.round(done/prepared.length*90));
  } prog(100); show('ok',`已上传 ${prepared.length} 张。谢谢！可以继续选择照片上传。`); document.getElementById('files').value=''; document.getElementById('preview').innerHTML=''; prepared=[];
  }catch(err){show('bad','上传失败，请换网络或稍后重试。')} finally{btn.disabled=false;}
});
</script>
</body></html>
